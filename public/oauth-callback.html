<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Connecting…</title></head>
<body>
<script>
  const hash   = window.location.hash.slice(1)
  const search = window.location.search.slice(1)
  const params = new URLSearchParams(hash || search)

  const token = params.get('access_token')
  const error = params.get('error') || params.get('error_description')

  if (window.opener) {
    // ── Popup flow (desktop) ──────────────────────────────────
    window.opener.postMessage(
      { type: 'oauth_callback', token, error: error || null },
      window.location.origin
    )
    window.close()
  } else {
    // ── Redirect flow (mobile / PWA) ──────────────────────────
    // Store the token using the same key/format that cloudStorage.js expects,
    // so upload calls find it automatically without re-authenticating.
    if (token) {
      localStorage.setItem('logall_google_token', JSON.stringify({
        token,
        expiresAt: Date.now() + 55 * 60 * 1000,
      }))

      // Was this a silent re-auth triggered by an expired token during upload?
      const reauthPath = localStorage.getItem('logall_reauth_return_path')
      if (reauthPath) {
        localStorage.removeItem('logall_reauth_return_path')
        // Keep logall_reauth_pending so the target page can show "reconnected" notice
        window.location.replace(window.location.origin + reauthPath)
      } else {
        // Normal connect flow — return to Profile
        sessionStorage.setItem('logall_oauth_return', 'google')
        window.location.replace(window.location.origin + '/profile')
      }
    }
    if (error) {
      // Check if this was a silent re-auth attempt
      const reauthPath = localStorage.getItem('logall_reauth_return_path')
      if (reauthPath) {
        localStorage.removeItem('logall_reauth_return_path')
        localStorage.removeItem('logall_reauth_pending')
        // Silent re-auth failed — send user to profile to reconnect manually
        sessionStorage.setItem('logall_oauth_error', 'Session expired. Please reconnect Google Drive.')
        sessionStorage.setItem('logall_oauth_return', 'google')
        window.location.replace(window.location.origin + '/profile')
      } else {
        sessionStorage.setItem('logall_oauth_error', error)
        sessionStorage.setItem('logall_oauth_return', 'google')
        window.location.replace(window.location.origin + '/profile')
      }
    }
  }
</script>
</body>
</html>
